  const nationHtml = `
    <div class="page-section">
      <div class="page-section-title">About the Nation</div>
      <div class="stat-grid-2">
        <div class="stat-box">
          <div class="stat-box-label">Population</div>
          <div class="stat-box-val">${extra.pop || '—'}</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">WC Appearances</div>
          <div class="stat-box-val">${extra.wcApps != null ? extra.wcApps : '—'}</div>
        </div>
        <div class="stat-box full">
          <div class="stat-box-label">⚽ Football Fact</div>
          <div class="stat-box-val fact-text">${extra.footballFact || '—'}</div>
        </div>
        <div class="stat-box full">
          <div class="stat-box-label">🌍 Fun Fact</div>
          <div class="stat-box-val fact-text">${extra.nonFootballFact || '—'}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('page-body').innerHTML = `
    <div class="team-hero">
      <img class="team-flag-lg" src="${flagUrl(team.code, 160)}" alt="${team.name}"
           onerror="this.style.display='none'">
      <div class="team-name-lg">${team.name}</div>
      <div class="team-badges">
        <span class="conf-tag">${team.conf}</span>
        <span class="group-tag">Group ${team.group}</span>
        ${team.host ? '<span class="team-host-badge">🏠 Host Nation</span>' : ''}
      </div>
    </div>
    ${mode === 'nation' ? nationHtml : statsHtml}
  `;
})();
</script>
</body>
</html>
