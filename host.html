// ── RENDER ────────────────────────────────────────────────────
(function() {
  const params = new URLSearchParams(location.search);
  const name   = params.get('name');
  const data   = HOST_SCHEDULES[name];

  if (!data) {
    document.getElementById('page-body').innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;color:var(--muted)">' +
      '<div style="font-size:3rem">🤷</div><div>Host not found</div>' +
      '<button class="btn btn-outline" onclick="history.back()">← Go back</button></div>';
    return;
  }

  document.title = name + ' — Host Schedule · WC2026';

  // Build game cards
  let html = '';
  let lastPhase = '';
  data.games.forEach(g => {
    if (g.phase !== lastPhase) {
      const label = g.phase === 'group' ? '⚽ Group Stage' : '🏆 Knockout Rounds';
      html += `<div class="phase-divider">${label}</div>`;
      lastPhase = g.phase;
    }

    const hFlag = g.hCode
      ? `<img class="hg-flag" src="${flagUrl(g.hCode, 40)}" alt="${g.home}">`
      : `<div class="hg-flag-ph"></div>`;
    const aFlag = g.aCode
      ? `<img class="hg-flag" src="${flagUrl(g.aCode, 40)}" alt="${g.away}">`
      : `<div class="hg-flag-ph"></div>`;

    const timeCell = g.idt === 'TBD'
      ? `<span style="color:var(--muted);font-size:.85rem">TBD</span>`
      : `<span class="host-game-time">${g.idt}</span>`;

    html += `
      <div class="host-game-card">
        <div class="host-game-top">
          <span class="host-game-round ${g.phase}">${g.round}</span>
          <span class="host-game-date">${g.date}</span>
        </div>
        <div class="host-game-matchup">
          <div class="hg-team">${hFlag}<span class="hg-name">${g.home}</span></div>
          <div class="hg-vs">VS</div>
          <div class="hg-team right">${aFlag}<span class="hg-name">${g.away}</span></div>
        </div>
        <div class="host-game-meta">
          <span class="host-game-venue">${g.venue} · ${g.city}${VENUE_CAP[g.venue] ? ' · ' + VENUE_CAP[g.venue] : ''}</span>
          ${timeCell}
        </div>
      </div>`;
  });

  document.getElementById('page-body').innerHTML = `
    <div class="host-hero">
      <img class="host-flag-lg" src="${flagUrl(data.code, 160)}" alt="${name}"
           onerror="this.style.display='none'">
      <div class="host-hero-meta">
        <div class="host-hero-name">${name}</div>
        <div class="host-hero-tag">🏠 Host Nation · ${data.cities} cities · ${data.totalGames} matches</div>
        <div class="host-hero-cities">${data.cityList}</div>
      </div>
    </div>
    ${html}
    <div style="padding:.8rem 1.2rem 2rem;font-size:.62rem;color:#555;line-height:1.6;">
      ⁺¹ Next calendar day (Israel time) · All times IDT = UTC+3 · Knockout opponents TBD · Subject to FIFA confirmation
    </div>
  `;
})();
</script>
